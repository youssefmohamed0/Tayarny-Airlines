# Test-only configuration
# Use an in-memory DB so tests don't depend on docker-compose service names (e.g. host "db").

spring.datasource.url=jdbc:h2:mem:tayarny_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Disable Flyway for unit tests (migrations are Postgres-specific and require a running DB).
spring.flyway.enabled=false

# Keep test startup lightweight
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Required by JwtService / RefreshTokenService
app.jwt.secret=test-secret-should-be-long-enough-for-hmac-sha-256-32bytes-min
app.jwt.access-token-expiration-ms=3600000
app.jwt.refresh-token-expiration-ms=86400000
