# Integration test configuration — uses Testcontainers PostgreSQL
# Datasource properties are injected by @DynamicPropertySource in BaseIntegrationTest

# Enable Flyway for integration tests (the real DB needs migrations)
spring.flyway.enabled=true

# Let Hibernate auto-validate the schema created by Flyway
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Required by JwtService / RefreshTokenService
app.jwt.secret=test-secret-should-be-long-enough-for-hmac-sha-256-32bytes-min
app.jwt.access-token-expiration-ms=3600000
app.jwt.refresh-token-expiration-ms=86400000
